<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2064%2064'%3E%3Crect%20width='64'%20height='64'%20fill='%2310171b'/%3E%3Cpath%20d='M10%2044%2048%2012l6%206-38%2032z'%20fill='%23f4c24c'/%3E%3Cpath%20d='M44%2016%2058%206%2052%2022z'%20fill='%23ff5b4a'/%3E%3C/svg%3E">
<title>Throw Master</title>
<style>
html,body,#mount{width:100%;height:100%;margin:0;overflow:hidden;background:#10171b}
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#ffe9b0}
iframe{display:block;width:100%;height:100%;border:0;background:#10171b}
.boot{position:fixed;inset:0;display:grid;place-items:center;padding:24px;text-align:center;background:linear-gradient(#23353d,#10171b);z-index:2}
.loaded .boot{display:none}
.boot-card{max-width:520px}
.boot-title{font-size:28px;font-weight:800;margin-bottom:12px}
.boot-text{font-size:15px;color:#f5ddb0;line-height:1.5}
</style>
</head>
<body>
<div id="mount"></div>
<div class="boot" id="boot">
  <div class="boot-card">
    <div class="boot-title">Throw Master</div>
    <div class="boot-text" id="status">Загрузка свежей версии игры...</div>
  </div>
</div>
<script>
(() => {
  const status = document.getElementById("status");
  const mount = document.getElementById("mount");

  const setStatus = (text) => {
    if (status) status.textContent = text;
  };

  const freshUrl = (file, key, value) => {
    const url = new URL(file, window.location.href);
    url.searchParams.set(key, value);
    return url;
  };

  const load = async () => {
    const nonce = String(Date.now());
    const manifestResponse = await fetch(freshUrl("release.json", "t", nonce), {
      cache: "no-store",
      headers: { "Cache-Control": "no-cache" }
    });
    if (!manifestResponse.ok) {
      throw new Error("release manifest unavailable");
    }

    const manifest = await manifestResponse.json();
    const buildId = String(manifest.buildId || nonce);
    const gameFile = String(manifest.game || "game.html");
    console.info("[Throw Master Loader]", {
      gameVersion: manifest.gameVersion,
      displayVersion: manifest.displayVersion,
      buildId,
      gameFile
    });
    const frame = document.createElement("iframe");
    frame.title = "Throw Master";
    frame.allow = "fullscreen; autoplay";
    frame.allowFullscreen = true;
    frame.src = freshUrl(gameFile, "v", buildId).toString();
    frame.addEventListener("load", () => document.body.classList.add("loaded"), { once: true });
    mount.replaceChildren(frame);
  };

  load().catch((error) => {
    console.error(error);
    setStatus("Не удалось загрузить свежую версию. Обновите страницу через несколько секунд.");
  });
})();
</script>
</body>
</html>
